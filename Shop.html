<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="Shop.css">
</head>
<body>

    <header>
        <div>
            <a href="Index.html" class="logo">CHVNGES</a>
        </div>  
        <nav>

            <a href="#">Wellness</a>
